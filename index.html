<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moto Frete ADM - Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="assets/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="assets/icons/site.webmanifest">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">MF</div>
        <div>
          <h1>Moto Frete ADM</h1>
          <p>Painel administrativo</p>
        </div>
      </div>
    </aside>

    <main class="content">
      <section class="centered-card active">
        <div class="card login-card">
          <h2>Entrar no ADM</h2>
          <p>Somente a conta autorizada pode acessar este painel.</p>
          <button id="loginBtn" class="btn btn-primary">Entrar com Google</button>
          <p id="loginMessage" class="message"></p>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="assets/js/firebase-config.js"></script>
  <script type="module" src="assets/js/login.js"></script>
</body>
</html>
